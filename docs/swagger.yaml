openapi: 3.0.3

info:
  title: Coworking Booking System – Public API
  version: 1.0.0
  description: >
    Публичное REST API системы бронирования мест в университетском коворкинге.
    Используется мобильным приложением (Flutter) и веб-панелью администратора.
    Все запросы проходят через API Gateway.

servers:
  - url: https://api.coworking.local

tags:
  - name: Auth
  - name: Users
  - name: Coworkings
  - name: Places
  - name: Bookings
  - name: Analytics
  - name: Admin

paths:
  ##################
  # 🔐 AUTH SERVICE
  ##################

  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "409":
          description: Пользователь уже существует

  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT токены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Неверные учетные данные

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access/refresh токенов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Новая пара токенов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Невалидный refresh токен

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход пользователя (инвалидация refresh токена)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Пользователь разлогинен

  /users/me:
    get:
      tags: [Users]
      summary: Получить профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Неавторизован

  /users/sessions/active:
    get:
      tags: [Users]
      summary: Получить активные сессии пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список активных сессий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSession"

  /users/sessions/all:
    get:
      tags: [Users]
      summary: Получить все сессии пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех сессий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSession"

  /users/sessions/revoke:
    post:
      tags: [Users]
      summary: Отозвать (разлогинить) сессию по ID
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Сессия отозвана

  ##################
  # 🏢 COWORKINGS
  ##################

  /coworkings:
    get:
      tags: [Coworkings]
      summary: Получить список коворкингов
      responses:
        "200":
          description: Список коворкингов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coworking"

  /coworkings/{coworkingId}:
    get:
      tags: [Coworkings]
      summary: Получить коворкинг по ID
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Коворкинг
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coworking"

  /coworkings/{coworkingId}/places:
    get:
      tags: [Places]
      summary: Получить места в коворкинге
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Список мест
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Place"

  ##################
  # 📅 BOOKINGS
  ##################

  /bookings:
    post:
      tags: [Bookings]
      summary: Создать бронирование
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    get:
      tags: [Bookings]
      summary: История бронирований пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список бронирований
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Получить бронирование по ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Бронирование
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    delete:
      tags: [Bookings]
      summary: Отменить бронирование
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "202":
          description: Бронирование отменено (в обработке)

  ##################
  # 📊 ANALYTICS
  ##################

  /analytics/hourly{coworkingId}:
    get:
      tags: [Analytics]
      summary: Занятность коворкинга по часам за весь день
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HourlyLoadResponse"

  /analytics/weekday/{coworkingId}:
    get:
      tags: [Analytics]
      summary: Занятность коворкинга по дням недели
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekdayLoadResponse"
  /analytics/coworking_heatmap/{coworkingId}:
    get:
      tags: [Analytics]
      summary: Получение тепловой карты занятости коворкинга (дни недели х часы)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoworkingHeatmapResponse"
  /analytics/place_heatmap/{placeId}:
    get:
      tags: [Analytics]
      summary: Получение тепловой карты занятости места (дни недели х часы)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: placeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceHeatmapResponse"

  ##################
  # 🔔 NOTIFICATIONS
  ##################

  /notifications:
    get:
      tags: [Notifications]
      summary: Получить непрочитанные уведомления
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список непрочитанных уведомлений (лимит 10)
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/device:
    post:
      tags: [Notifications]
      summary: Регистрация push-токена устройства
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceToken
                - platform
              properties:
                deviceToken:
                  type: string
                platform:
                  type: string
                  enum:
                    - ios
                    - android
      responses:
        "201":
          description: Device token registered
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{notificationId}:
    patch:
      tags: [Notifications]
      summary: Отметить уведомление прочитанным
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification marked as read
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  ##################
  # 🛠 ADMIN
  ##################

  /admin/coworkings:
    post:
      tags: [Admin]
      summary: Создать коворкинг
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoworkingRequest"
      responses:
        "201":
          description: Коворкинг создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coworking"
  /admin/coworkings/{coworkingId}:
    put:
      tags: [Admin]
      summary: Обновить данные коворкинга
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoworkingRequest"
      responses:
        "200":
          description: Коворкинг обновлён

  /admin/coworkings/{coworkingId}/deactivate:
    put:
      tags: [Admin]
      summary: Удалить (деактивировать) коворкинг
      description: Физически не удаляется, помечается как неактивный
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Коворкинг деактивирован
  /admin/places:
    post:
      tags: [Admin]
      summary: Добавить места в коворкинг
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coworkingId, places]
              properties:
                coworkingId:
                  type: string
                  format: uuid
                places:
                  type: array
                  items:
                    $ref: "#/components/schemas/CreatePlaceRequest"

      responses:
        "201":
          description: Место создано

  /admin/places/{placeId}/active:
    put:
      tags: [Admin]
      summary: Удалить (деактивировать) место
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: placeId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
      responses:
        "202":
          description: Статус места изменён

  /admin/bookings:
    get:
      tags: [Admin]
      summary: Получение всех активных бронирований администратором с фильтром по коворкингу
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Список бронирований
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/bookings/{bookingId}:
    delete:
      tags: [Admin]
      summary: Отменить бронирование пользователя
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "202":
          description: Бронирование отменено администратором
  /coworkings/{coworkingId}/layout:
    get:
      tags: [Coworkings]
      summary: Получить актуальную схему размещения коворкинга
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Схема размещения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layout"

  /coworkings/{coworkingId}/layouts:
    get:
      tags: [Coworkings]
      summary: Получить список версий схемы размещения
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Список версий схемы
          content:
            application/json:
              schema:
                type: object
                properties:
                  layoutVersions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LayoutVersion"

  /coworkings/{coworkingId}/layouts/{version}:
    get:
      tags: [Coworkings]
      summary: Получить схему размещения по версии
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: version
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Схема размещения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layout"

  /coworkings/{coworkingId}/available-places:
    get:
      tags: [Places]
      summary: Получить свободные места в коворкинге за интервал
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: startTime
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: endTime
          required: true
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Список доступных мест
          content:
            application/json:
              schema:
                type: object
                properties:
                  places:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"

  /admin/coworkings/{coworkingId}/layouts:
    post:
      tags: [Admin]
      summary: Создать новую версию схемы размещения
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLayoutRequest"
      responses:
        "201":
          description: Версия схемы создана

  /admin/coworkings/{coworkingId}/layouts/rollback:
    post:
      tags: [Admin]
      summary: Откатить последнюю версию схемы размещения
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202":
          description: Откат запущен

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: integer
          description: HTTP status code
      example:
        message: "Invalid request parameters"
        code: 400
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          description: Notification type (e.g., booking, alert)
        title:
          type: string
        body:
          type: string
        payload:
          type: object
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 900

    RegisterRequest:
      type: object
      required: [email, first_name, last_name, password, role_code]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        roleCode:
          type: string
          enum: [student, teacher, admin]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, teacher, admin]

    Coworking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        isActive:
          type: boolean

    CreateCoworkingRequest:
      type: object
      required: [name, address]
      properties:
        name:
          type: string
        address:
          type: string

    CoworkingHeatmapResponse:
      type: object
      required: [coworkingId]
      properties:
        heatmap:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapCell"

    PlaceHeatmapResponse:
      type: object
      required: [placeId]
      properties:
        heatmap:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapCell"

    HeatmapCell:
      type: object
      properties:
        weekday:
          type: integer
          format: uint8
          description: День недели (1-7, понедельник=0)
        hour:
          type: integer
          format: uint8
          description: Час суток (0-23)
        count:
          type: integer
          format: uint64
          description: Количество бронирований в данную ячейку

    HourlyLoadResponse:
      type: object
      properties:
        load:
          type: object
          additionalProperties:
            type: integer
          description: Ключ — час (int), значение — количество бронирований

    WeekdayLoadResponse:
      type: object
      properties:
        load:
          type: object
          additionalProperties:
            type: integer
          description: Ключ — день недели (int), значение — количество бронирований

    PlaceAnalyticsRequest:
      type: object
      required: [placeId]
      properties:
        placeId:
          type: string
          format: uuid

    CoworkingAnalyticsRequest:
      type: object
      required: [coworkingId]
      properties:
        coworkingId:
          type: string
          format: uuid

    Place:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coworkingId:
          type: string
          format: uuid
        label:
          type: string
        placeType:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user_name:
          type: string
        place:
          $ref: "#/components/schemas/Place"
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
        cancelReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true

    CreateBookingRequest:
      type: object
      required: [placeId, startTime, endTime]
      properties:
        placeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time

    Layout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coworkingId:
          type: string
