openapi: 3.0.3

info:
  title: Coworking Booking System – Public API
  version: 1.0.0
  description: >
    Публичное REST API системы бронирования мест в университетском коворкинге.
    Используется мобильным приложением (Flutter) и веб-панелью администратора.
    Все запросы проходят через API Gateway.

servers:
  - url: https://api.coworking.local

tags:
  - name: Auth
  - name: Users
  - name: Coworkings
  - name: Places
  - name: Bookings
  - name: Analytics
  - name: Admin

paths:
  ##################
  # 🔐 AUTH SERVICE
  ##################

  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "409":
          description: Пользователь уже существует

  /auth/login:
    post:
      tags: [Auth]
      summary: Авторизация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT токены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Неверные учетные данные

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access/refresh токенов
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Новая пара токенов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Невалидный refresh токен

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход пользователя (инвалидация refresh токена)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "204":
          description: Пользователь разлогинен

  /users/me:
    get:
      tags: [Users]
      summary: Получить профиль текущего пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Неавторизован

  /users/sessions/active:
    get:
      tags: [Users]
      summary: Получить активные сессии пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список активных сессий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSession"

  /users/sessions/all:
    get:
      tags: [Users]
      summary: Получить все сессии пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех сессий
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSession"

  /users/sessions/revoke:
    post:
      tags: [Users]
      summary: Отозвать (разлогинить) сессию по ID
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Сессия отозвана

  ##################
  # 🏢 COWORKINGS
  ##################

  /coworkings:
    get:
      tags: [Coworkings]
      summary: Получить список коворкингов
      responses:
        "200":
          description: Список коворкингов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coworking"

  /coworkings/{coworkingId}:
    get:
      tags: [Coworkings]
      summary: Получить коворкинг по ID
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Коворкинг
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coworking"

  /coworkings/{coworkingId}/places:
    get:
      tags: [Places]
      summary: Получить места в коворкинге
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Список мест
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Place"

  ##################
  # 📅 BOOKINGS
  ##################

  /bookings:
    post:
      tags: [Bookings]
      summary: Создать бронирование
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Бронирование создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    get:
      tags: [Bookings]
      summary: История бронирований пользователя
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список бронирований
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}:
    get:
      tags: [Bookings]
      summary: Получить бронирование по ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Бронирование
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    delete:
      tags: [Bookings]
      summary: Отменить бронирование
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "202":
          description: Бронирование отменено (в обработке)

  ##################
  # 📊 ANALYTICS
  ##################

  /analytics/usage:
    get:
      tags: [Analytics]
      summary: Статистика использования коворкинга
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStats"

  ##################
  # 🛠 ADMIN
  ##################

  /admin/coworkings:
    post:
      tags: [Admin]
      summary: Создать коворкинг
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCoworkingRequest"
      responses:
        "201":
          description: Коворкинг создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coworking"
  /admin/coworkings/{coworkingId}:
    put:
      tags: [Admin]
      summary: Обновить данные коворкинга
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCoworkingRequest"
      responses:
        "200":
          description: Коворкинг обновлён

  /admin/coworkings/{coworkingId}/deactivate:
    put:
      tags: [Admin]
      summary: Удалить (деактивировать) коворкинг
      description: Физически не удаляется, помечается как неактивный
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Коворкинг деактивирован
  /admin/places:
    post:
      tags: [Admin]
      summary: Добавить место в коворкинг
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coworkingId, label, placeType]
              properties:
                coworkingId:
                  type: string
                  format: uuid
                label:
                  type: string
                placeType:
                  type: string
      responses:
        "201":
          description: Место создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
  /admin/places/{placeId}/active:
    put:
      tags: [Admin]
      summary: Удалить (деактивировать) место
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: placeId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
      responses:
        "202":
          description: Статус места изменён

  /admin/bookings/{bookingId}:
    delete:
      tags: [Admin]
      summary: Отменить бронирование пользователя
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: bookingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "202":
          description: Бронирование отменено администратором
  /coworkings/{coworkingId}/layout:
    get:
      tags: [Coworkings]
      summary: Получить актуальную схему размещения коворкинга
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Схема размещения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layout"

  /coworkings/{coworkingId}/layouts:
    get:
      tags: [Coworkings]
      summary: Получить список версий схемы размещения
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Список версий схемы
          content:
            application/json:
              schema:
                type: object
                properties:
                  layoutVersions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LayoutVersion"

  /coworkings/{coworkingId}/layouts/{version}:
    get:
      tags: [Coworkings]
      summary: Получить схему размещения по версии
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: version
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Схема размещения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Layout"

  /coworkings/{coworkingId}/available-places:
    get:
      tags: [Places]
      summary: Получить свободные места в коворкинге за интервал
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: startTime
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: endTime
          required: true
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Список доступных мест
          content:
            application/json:
              schema:
                type: object
                properties:
                  places:
                    type: array
                    items:
                      $ref: "#/components/schemas/Place"

  /admin/coworkings/{coworkingId}/layouts:
    post:
      tags: [Admin]
      summary: Создать новую версию схемы размещения
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLayoutRequest"
      responses:
        "201":
          description: Версия схемы создана

  /admin/coworkings/{coworkingId}/layouts/rollback:
    post:
      tags: [Admin]
      summary: Откатить последнюю версию схемы размещения
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: coworkingId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "202":
          description: Откат запущен
  /admin/analytics/usage:
    get:
      tags: [Admin]
      summary: Расширенная статистика использования
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: coworking_id
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Детальная статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 900

    RegisterRequest:
      type: object
      required: [email, password, name, role_code]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        roleCode:
          type: string
          enum: [student, teacher, admin]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, teacher, admin]

    Coworking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        isActive:
          type: boolean

    CreateCoworkingRequest:
      type: object
      required: [name, address]
      properties:
        name:
          type: string
        address:
          type: string

    Place:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coworkingId:
          type: string
          format: uuid
        label:
          type: string
        placeType:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        place:
          $ref: "#/components/schemas/Place"
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
        cancelReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true

    CreateBookingRequest:
      type: object
      required: [placeId, startTime, endTime]
      properties:
        placeId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time

    Layout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coworkingId:
          type: string
          format: uuid
        version:
          type: integer
        layout:
          type: object
        createdAt:
          type: string
          format: date-time

    LayoutVersion:
      type: object
      properties:
        version:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateLayoutRequest:
      type: object
      required: [coworkingId, version, layout]
      properties:
        coworkingId:
          type: string
          format: uuid
        version:
          type: integer
        layout:
          type: object

    UsageStats:
      type: object
      properties:
        peak_hours:
          type: array
          items:
            type: integer
        total_bookings:
          type: integer

    UpdateCoworkingRequest:
      type: object
      properties:
        name: { type: string }
        address: { type: string }

    CreatePlaceRequest:
      type: object
      required: [label, type]
      properties:
        label: { type: string }
        type: { type: string }

    UpdatePlaceRequest:
      type: object
      properties:
        label: { type: string }
        type: { type: string }
        is_available: { type: boolean }

    UserSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user_agent:
          type: string
        device:
          type: string
        revoked:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        ipAddress:
          type: string
        lastUsedAt:
          type: string
          format: date-time
