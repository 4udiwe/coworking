app:
  name: "coworking-scheduler-service"
  version: "1.0.0"

logger:
  level: "info"

postgres:
  connect_timeout: 5s

worker:
  worker_batch_limit: 20
  interval: 5s

kafka:
  brokers:
    - "kafka:9092"
  topics:
    booking_events: "booking.events"

  producer:
    required_acks: 1
    batch_size: 5
    batch_timeout: 50ms
    compression: "snappy"

  consumer:
    group_id: "scheduler-service"
    max_wait: 50ms
    session_timeout: 10s
    heartbeat_interval: 3s
    commit_interval: 1s

outbox:
  topic: "scheduler.events"
  batch_limit: 5
  interval: 3s
  reque_batch_limit: 10
  reque_interval: 30s

scheduler:
  remind_before: 10m
