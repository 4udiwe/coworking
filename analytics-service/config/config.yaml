app:
  name: "coworking-analytics-service"
  version: "1.0.0"

http:
  port: "8084"

logger:
  level: "info"

postgres:
  connect_timeout: 5s

kafka:
  brokers:
    - "kafka:9092"
  topics:
    booking_events: "booking.events"

  consumer:
    group_id: "analytics-service"
    max_wait: 50ms
    session_timeout: 10s
    heartbeat_interval: 3s
    commit_interval: 1s

batch_buffer:
  batch_size: 5
  flush_interval: 10s

auth:
  public_key_path: "/app/keys/public.pem"