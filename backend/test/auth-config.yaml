app:
  name: "coworking-auth-service"
  version: "1.0.0"

http:
  port: "8080"

logger:
  level: "debug"

postgres:
  url: "postgres://authuser:authpass@postgres_auth_test:5432/authdb"
  connect_timeout: 5s

auth:
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  private_key_path: /app/keys/private.pem

hasher:
  cost: 4

kafka:
  brokers:
    - "kafka:9092"
  consumer:
    group_id: "auth-service"
    max_wait: 50ms
    session_timeout: 10s
    heartbeat_interval: 3s
    commit_interval: 1s
